# This workflow will install Python dependencies and run tests

name: Python tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install uv
      run: |
        python -m pip install --upgrade pip
        pip install uv
    - name: Install Python
      run: |
        uv python install
        echo "Python version:"
        uv run python --version
    - name: Install dependencies
      run: |
        uv sync
    - name: Test with pytest
      run: |
        uv run pytest
