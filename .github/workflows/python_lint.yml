# This workflow will lint Python files using ruff

name: Python lint

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install uv
      run: |
        python -m pip install --upgrade pip
        pip install uv
    - name: ruff lint
      run: uvx ruff check
