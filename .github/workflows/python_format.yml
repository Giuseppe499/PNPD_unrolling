# This workflow will check Python files formatting using ruff

name: Python format

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install uv
      run: |
        python -m pip install --upgrade pip
        pip install uv
    - name: ruff check formatting
      run: uvx ruff format --diff
